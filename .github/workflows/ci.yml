name: ci
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Defense-in-depth: even a clone without the local pre-commit hook cannot land
  # a secret on a branch — CI re-scans the FULL history on every push/PR.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history, not just the diff
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test
